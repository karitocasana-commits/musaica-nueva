<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psicosis Music</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel para compilar el código React en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Librería jsmediatags para leer metadatos y portadas internas del MP3 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #020617; } /* slate-950 */
        .animate-spin-slow {
            animation: spin 8s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: rgba(34, 211, 238, 0.5);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: currentColor;
            cursor: pointer;
            box-shadow: 0 0 10px currentColor;
        }
    </style>
</head>
<body class="bg-slate-950 text-neutral-200">
    
    <!-- Contenedor donde React inyectará la aplicación -->
    <div id="root"></div>

    <!-- Script principal de React -->
    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
            Play, Pause, SkipForward, SkipBack, Volume2, VolumeX,
            Download, Plus, Link as LinkIcon, Music, Disc3, Zap, Trash2, Search
        } from 'https://esm.sh/lucide-react@0.294.0?deps=react@18.2.0';

        // Importación de Firebase para almacenamiento ilimitado y gratuito en Firestore
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // Inicialización de variables globales provistas por el entorno
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        function App() {
            const [isPlaying, setIsPlaying] = useState(false);
            const [progress, setProgress] = useState(0);
            const [duration, setDuration] = useState(0);
            const [volume, setVolume] = useState(0.8);
            const [isMuted, setIsMuted] = useState(false);
            const [errorMessage, setErrorMessage] = useState("");
            const [currentTrackIndex, setCurrentTrackIndex] = useState(0);
            const [inputUrl, setInputUrl] = useState("");
            const [searchTerm, setSearchTerm] = useState("");
            
            // Estados para el reproductor en la nube
            const [isBuffering, setIsBuffering] = useState(false);
            const [resolvedAudioSrc, setResolvedAudioSrc] = useState("");
            
            // Lista de reproducción dinámica que combina locales con nube
            const [playlist, setPlaylist] = useState([]);
            const [user, setUser] = useState(null);

            const audioRef = useRef(null);

            // --- ESTADOS DE ADMINISTRADOR ---
            const [isAdmin, setIsAdmin] = useState(false);

            // 1. Inicialización de Autenticación antes de cualquier consulta
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Error en autenticación Firebase:", err);
                    }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, (usr) => {
                    setUser(usr);
                    if (localStorage.getItem('psicosis_admin') === 'true') {
                        setIsAdmin(true);
                    }
                });
                return () => unsubscribe();
            }, []);

            // 2. Escuchar la cola de reproducción en tiempo real desde la nube
            useEffect(() => {
                if (!user) return; // Esperar a que el usuario esté autenticado

                const songsColRef = collection(db, 'artifacts', appId, 'public', 'data', 'songs');
                
                const unsubscribe = onSnapshot(songsColRef, (snapshot) => {
                    const cloudSongs = [];
                    snapshot.forEach((doc) => {
                        cloudSongs.push(doc.data());
                    });
                    
                    // Ordenar canciones por fecha de subida (las nuevas al final)
                    cloudSongs.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
                    
                    // Canciones predeterminadas por defecto
                    const defaultSongs = [
                        {
                            id: "default_1",
                            title: "PAL TO",
                            artist: "Austin San",
                            album: "Sencillo Oficial",
                            src: "https://ia600400.us.archive.org/29/items/austin-san-pal-to/Austin%20San%20-%20PAL%20TO.mp3",
                            cover: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&w=600&q=80"
                        },
                        {
                            id: "default_2",
                            title: "NUEVAYoL",
                            artist: "Bad Bunny",
                            album: "Nadie Sabe Lo Que Va A Pasar Mañana",
                            src: "https://ia902803.us.archive.org/29/items/01.-bad-bunny-nuevayo-l/01.%20Bad%20Bunny%20-%20NUEVAYoL.mp3",
                            cover: "https://is1-ssl.mzstatic.com/image/thumb/Music116/v4/cb/21/e4/cb21e427-46e3-15ea-f01f-0ec034f54eb7/38477.jpg/600x600bb.jpg"
                        }
                    ];
                    
                    setPlaylist([...defaultSongs, ...cloudSongs]);
                }, (error) => {
                    console.error("Error cargando cola desde Firestore:", error);
                    setErrorMessage("Error de conexión con la nube ❌");
                });
                
                return () => unsubscribe();
            }, [user]);

            // 3. Reensamblado inteligente de audio en memoria al cambiar de pista
            useEffect(() => {
                const currentTrack = playlist[currentTrackIndex];
                if (!currentTrack) return;
                setResolvedAudioSrc(currentTrack.src);
            }, [currentTrackIndex, playlist]);

            const currentTrack = playlist[currentTrackIndex];
            const coverSrc = currentTrack?.cover || "";
            const fallbackCover = "https://placehold.co/600x600/0f172a/c026d3?text=PSICOSIS+MUSIC";

            // Función para acceder al Modo Creador
            const handleAdminAccess = () => {
                if (isAdmin) return;
                
                const pwd = window.prompt("ACCESO RESTRINGIDO. Clave de creador:");
                if (pwd === "psicosis") {
                    setIsAdmin(true);
                    localStorage.setItem('psicosis_admin', 'true');
                    setErrorMessage("¡Modo Creador Desbloqueado! 🔓");
                    setTimeout(() => setErrorMessage(""), 4000);
                } else if (pwd !== null) {
                    setErrorMessage("Clave incorrecta ❌");
                    setTimeout(() => setErrorMessage(""), 3000);
                }
            };

            // --- Extracción de metadatos y carátula directamente de la URL ---
            const handleAddTrack = async (e) => {
                e.preventDefault();
                if (!user) return;
                const urlToAdd = inputUrl.trim();
                if (!urlToAdd) return;

                // Evitar canciones duplicadas
                const isDuplicate = playlist.some(track => track.src === urlToAdd);
                if (isDuplicate) {
                    setErrorMessage("⚠️ Este enlace ya está en la cola.");
                    setTimeout(() => setErrorMessage(""), 3000);
                    return;
                }

                setErrorMessage("Conectando con el enlace del audio... ⚡");

                // Nombre por defecto extraído de la URL en caso de que falle todo
                const urlParts = urlToAdd.split('/');
                let decodedTitle = decodeURIComponent(urlParts[urlParts.length - 1]);
                let baseName = decodedTitle.replace(/\.[a-zA-Z0-9]+$/i, ''); // Quitar extensión

                let finalTitle = baseName;
                let finalArtist = "Artista Desconocido";
                let finalAlbum = "Sencillo";
                let finalCover = fallbackCover;

                try {
                    // 1. Descargamos únicamente el inicio del archivo usando un stream de lectura directo (evita CORS de preflight)
                    const response = await fetch(urlToAdd);
                    if (!response.ok) throw new Error("Fallo al conectarse con el servidor de audio");

                    const reader = response.body.getReader();
                    const chunks = [];
                    let receivedLength = 0;
                    const maxBytesToRead = 1.5 * 1024 * 1024; // Descargamos solo 1.5 MB para leer las ID3 tags

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        receivedLength += value.length;
                        if (receivedLength >= maxBytesToRead) {
                            await reader.cancel(); // Cancelamos la descarga para no consumir datos adicionales
                            break;
                        }
                    }

                    // Unimos los fragmentos descargados
                    const mergedBuffer = new Uint8Array(receivedLength);
                    let position = 0;
                    for (let chunk of chunks) {
                        mergedBuffer.set(chunk, position);
                        position += chunk.length;
                    }

                    const audioBlob = new Blob([mergedBuffer], { type: 'audio/mpeg' });

                    setErrorMessage("Leyendo carátula y metadatos integrados... 🎨");

                    // 2. Leemos la carátula y metadatos internos del Blob en memoria
                    const tags = await new Promise((resolve, reject) => {
                        if (window.jsmediatags) {
                            window.jsmediatags.read(audioBlob, {
                                onSuccess: (tag) => resolve(tag.tags),
                                onError: (err) => reject(err)
                            });
                        } else {
                            reject("Librería de metadatos no disponible");
                        }
                    });

                    if (tags) {
                        if (tags.title) finalTitle = tags.title;
                        if (tags.artist) finalArtist = tags.artist;
                        if (tags.album) finalAlbum = tags.album;
                        
                        // Extraemos la carátula integrada
                        if (tags.picture) {
                            const { data, format } = tags.picture;
                            let base64String = "";
                            const bytes = new Uint8Array(data);
                            for (let i = 0; i < bytes.byteLength; i++) {
                                base64String += String.fromCharCode(bytes[i]);
                            }
                            finalCover = `data:${format};base64,${btoa(base64String)}`;
                        }
                    }

                } catch (err) {
                    console.log("No se pudo extraer la carátula interna directamente. Buscando en la base de datos externa...", err);
                    
                    // Fallback: Si no tiene tags internas o la red bloqueó la lectura, busca en Apple Music
                    try {
                        const cleanQuery = baseName.replace(/[-_\|~]/g, ' ').trim();
                        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(cleanQuery)}&entity=song&limit=1`);
                        const data = await res.json();
                        if (data.results && data.results.length > 0) {
                            const trackData = data.results[0];
                            finalTitle = trackData.trackName;
                            finalArtist = trackData.artistName;
                            finalAlbum = trackData.collectionName;
                            finalCover = trackData.artworkUrl100.replace('100x100bb', '600x600bb');
                        }
                    } catch (apiErr) {
                        console.error("Error en fallback de base de datos:", apiErr);
                    }
                }

                try {
                    setErrorMessage("Subiendo información general a la nube... ☁️");
                    
                    const songId = 'song_' + Date.now();
                    const songDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'songs', songId);
                    
                    // Guardamos la carátula (base64) y la URL del audio de forma permanente en la nube
                    await setDoc(songDocRef, {
                        id: songId,
                        title: finalTitle,
                        artist: finalArtist,
                        album: finalAlbum,
                        src: urlToAdd,
                        cover: finalCover,
                        createdAt: Date.now()
                    });

                    setInputUrl("");
                    setErrorMessage("¡Canción y Carátula sincronizadas con éxito! 🎉🔥");
                    setTimeout(() => setErrorMessage(""), 3000);
                } catch (err) {
                    console.error("Error al inyectar enlace en Firestore:", err);
                    setErrorMessage("Error al conectar con la nube ❌");
                    setTimeout(() => setErrorMessage(""), 3000);
                }
            };

            const removeTrack = async (index, e) => {
                e.stopPropagation();
                if (!user) return;
                const trackToDelete = playlist[index];
                
                if (trackToDelete.id.startsWith("default_")) {
                    setErrorMessage("No puedes eliminar pistas por defecto.");
                    setTimeout(() => setErrorMessage(""), 3000);
                    return;
                }
                
                setErrorMessage("Eliminando de la nube de Google... 🗑️");
                
                try {
                    const songDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'songs', trackToDelete.id);
                    await deleteDoc(songDocRef);
                    
                    if (currentTrackIndex === index) {
                        setCurrentTrackIndex(0);
                        setIsPlaying(false);
                    } else if (currentTrackIndex > index) {
                        setCurrentTrackIndex(currentTrackIndex - 1);
                    }
                    
                    setErrorMessage("¡Track eliminado permanentemente de la nube! ✅");
                    setTimeout(() => setErrorMessage(""), 3000);
                } catch (err) {
                    console.error("Error eliminando track en Firestore:", err);
                    setErrorMessage("Fallo al borrar en la nube ❌");
                    setTimeout(() => setErrorMessage(""), 3000);
                }
            };

            const playTrack = (index) => {
                if (isBuffering) return; // Bloquear interacción mientras carga
                setCurrentTrackIndex(index);
                setIsPlaying(true);
            };

            const togglePlay = async () => {
                if (!resolvedAudioSrc || isBuffering) return;
                if (isPlaying) {
                    audioRef.current.pause();
                    setIsPlaying(false);
                } else {
                    try {
                        await audioRef.current.play();
                        setIsPlaying(true);
                        setErrorMessage("");
                    } catch (error) {
                        console.error("Error al reproducir el audio:", error);
                        setIsPlaying(false);
                        setErrorMessage("Error al reproducir. Revisa si el enlace es válido.");
                        setTimeout(() => setErrorMessage(""), 5000);
                    }
                }
            };

            const handleTimeUpdate = () => setProgress(audioRef.current.currentTime);
            const handleLoadedMetadata = () => setDuration(audioRef.current.duration);

            const handleProgressChange = (e) => {
                const newTime = e.target.value;
                if(audioRef.current) audioRef.current.currentTime = newTime;
                setProgress(newTime);
            };

            const handleVolumeChange = (e) => {
                const newVolume = parseFloat(e.target.value);
                setVolume(newVolume);
                if (audioRef.current) audioRef.current.volume = newVolume;
                setIsMuted(newVolume === 0);
            };

            const toggleMute = () => {
                if (isMuted) {
                    if(audioRef.current) audioRef.current.volume = volume || 0.5;
                    setIsMuted(false);
                } else {
                    if(audioRef.current) audioRef.current.volume = 0;
                    setIsMuted(true);
                }
            };

            const handleNext = () => {
                if (isBuffering) return;
                setCurrentTrackIndex((prev) => (prev + 1) % playlist.length);
            };

            const handlePrev = () => {
                if (isBuffering) return;
                setCurrentTrackIndex((prev) => (prev - 1 + playlist.length) % playlist.length);
            };

            const handleDownload = async () => {
                try {
                    setErrorMessage("Descargando track... ⏳");
                    const response = await fetch(resolvedAudioSrc);
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `${currentTrack.title} - ${currentTrack.artist}.mp3`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                    setErrorMessage("¡Descarga completada! ✅");
                    setTimeout(() => setErrorMessage(""), 3000);
                } catch (error) {
                    console.error("CORS Error, abriendo link", error);
                    window.open(resolvedAudioSrc, '_blank');
                    setErrorMessage("");
                }
            };

            const formatTime = (time) => {
                if (!time || isNaN(time)) return "0:00";
                const minutes = Math.floor(time / 60);
                const seconds = Math.floor(time % 60);
                return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            };

            return (
                <div className="min-h-screen w-full font-sans text-neutral-200 selection:bg-cyan-500 selection:text-black flex flex-col items-center justify-center p-4 relative overflow-hidden">
                    
                    <div className="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-fuchsia-600/20 rounded-full blur-[120px] pointer-events-none"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-cyan-600/20 rounded-full blur-[120px] pointer-events-none"></div>

                    {errorMessage && (
                        <div className="absolute top-6 z-50 bg-black/80 border border-fuchsia-500 text-fuchsia-400 px-6 py-3 rounded-md shadow-[0_0_15px_rgba(217,70,239,0.5)] font-bold text-sm tracking-widest uppercase flex items-center gap-3 backdrop-blur-md animate-pulse">
                            <Zap size={18} /> {errorMessage}
                        </div>
                    )}

                    <div className="w-full max-w-4xl bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row z-10">
                        
                        <div className="w-full md:w-1/2 p-8 flex flex-col items-center justify-between border-b md:border-b-0 md:border-r border-white/10 relative">
                            
                            <div className="w-full flex justify-between items-center mb-8">
                                <h1 className="text-xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500 uppercase flex items-center gap-2 select-none">
                                    <div onClick={handleAdminAccess} className="cursor-pointer hover:scale-110 transition-transform">
                                        <Disc3 className="text-cyan-400 animate-spin-slow" style={{ animationPlayState: isPlaying && !isBuffering ? 'running' : 'paused' }} />
                                    </div>
                                    Psicosis
                                </h1>
                                <button onClick={handleDownload} disabled={isBuffering} className="bg-white/10 hover:bg-cyan-500 hover:text-black transition-all p-2 rounded-full border border-white/10 hover:border-cyan-500 hover:shadow-[0_0_15px_rgba(34,211,238,0.6)] disabled:opacity-50" title="Descargar Audio">
                                    <Download size={20} />
                                </button>
                            </div>

                            {/* Portada con efecto de buffering */}
                            <div className="relative group w-64 h-64 mb-8">
                                <div className={`absolute inset-0 bg-gradient-to-tr from-cyan-500 to-fuchsia-500 rounded-full blur-xl opacity-40 transition-opacity ${isPlaying && !isBuffering ? 'animate-pulse opacity-70' : ''}`}></div>
                                
                                <img 
                                    src={coverSrc} 
                                    alt="Cover" 
                                    className={`w-full h-full object-cover rounded-full border-4 border-slate-900 shadow-2xl relative z-10 transition-transform duration-[10s] ease-linear ${isPlaying && !isBuffering ? 'rotate-[360deg] animate-spin-slow' : ''}`}
                                    onError={(e) => { e.target.src = fallbackCover; }}
                                    style={{ animationPlayState: isPlaying && !isBuffering ? 'running' : 'paused' }}
                                />
                                
                                {isBuffering && (
                                    <div className="absolute inset-0 bg-black/80 backdrop-blur-sm rounded-full z-20 flex flex-col items-center justify-center gap-3">
                                        <div className="w-10 h-10 border-4 border-t-fuchsia-500 border-cyan-400 rounded-full animate-spin"></div>
                                        <span className="text-[10px] text-fuchsia-400 tracking-wider font-bold uppercase animate-pulse">Sintonizando...</span>
                                    </div>
                                )}
                                
                                <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-12 h-12 bg-slate-900 rounded-full border-4 border-neutral-800 z-30"></div>
                            </div>

                            <div className="text-center w-full mb-8">
                                <h2 className="text-3xl font-black uppercase tracking-wide text-white truncate mb-1" title={currentTrack?.title}>{currentTrack?.title || "Sin Pista"}</h2>
                                <p className="text-cyan-400 font-bold tracking-widest text-sm uppercase">{currentTrack?.artist || "---"}</p>
                            </div>

                            <div className="w-full flex items-center gap-4 mb-6 font-mono text-xs text-neutral-400">
                                <span>{formatTime(progress)}</span>
                                <div className="relative flex-1 h-2 bg-neutral-800 rounded-full group">
                                    <div 
                                        className="absolute top-0 left-0 h-full bg-gradient-to-r from-cyan-400 to-fuchsia-500 rounded-full"
                                        style={{ width: `${duration ? (progress / duration) * 100 : 0}%` }}
                                    ></div>
                                    <input 
                                        type="range" 
                                        min="0" 
                                        max={duration || 100} 
                                        value={progress}
                                        onChange={handleProgressChange}
                                        disabled={isBuffering}
                                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer disabled:cursor-not-allowed"
                                    />
                                </div>
                                <span>{formatTime(duration)}</span>
                            </div>

                            <div className="flex items-center gap-6">
                                <button onClick={handlePrev} disabled={isBuffering} className="text-neutral-400 hover:text-cyan-400 transition-colors disabled:opacity-55"><SkipBack size={28} fill="currentColor" /></button>
                                <button 
                                    onClick={togglePlay} 
                                    disabled={isBuffering}
                                    className="w-16 h-16 flex items-center justify-center bg-white text-black rounded-full hover:scale-105 hover:bg-cyan-400 transition-all shadow-[0_0_20px_rgba(255,255,255,0.2)] hover:shadow-[0_0_30px_rgba(34,211,238,0.6)] disabled:opacity-50"
                                >
                                    {isPlaying && !isBuffering ? <Pause size={32} fill="currentColor" /> : <Play size={32} fill="currentColor" className="ml-1" />}
                                </button>
                                <button onClick={handleNext} disabled={isBuffering} className="text-neutral-400 hover:text-cyan-400 transition-colors disabled:opacity-55"><SkipForward size={28} fill="currentColor" /></button>
                            </div>
                        </div>

                        <div className="w-full md:w-1/2 p-6 flex flex-col bg-black/40">
                            
                            {/* SECCIÓN DEL ADMINISTRADOR/CREADOR */}
                            {isAdmin && (
                                <div className="mb-6 space-y-4 border-b border-white/10 pb-6">
                                    
                                    {/* Unificado: Pegar Enlace MP3 Directo de Archive.org */}
                                    <form onSubmit={handleAddTrack}>
                                        <label className="text-xs font-bold text-cyan-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                                            <LinkIcon size={14} /> Modo Creador: Pegar Enlace MP3 (Extraerá Cover Automático)
                                        </label>
                                        <div className="flex gap-2">
                                            <input 
                                                type="url" 
                                                placeholder="Pega el enlace directo MP3 de Archive.org aquí..." 
                                                value={inputUrl}
                                                onChange={(e) => setInputUrl(e.target.value)}
                                                className="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 focus:bg-white/10 transition-colors placeholder:text-neutral-600"
                                                required
                                            />
                                            <button 
                                                type="submit" 
                                                className="bg-cyan-500 hover:bg-cyan-400 text-black px-4 py-3 rounded-lg font-bold transition-colors flex items-center justify-center"
                                                title="Inyectar y Auto-escanear MP3"
                                            >
                                                <Plus size={20} />
                                            </button>
                                        </div>
                                    </form>

                                </div>
                            )}

                            <div className="flex items-center gap-3 bg-white/5 p-3 rounded-lg mb-6 border border-white/5">
                                <button onClick={toggleMute} className="text-neutral-400 hover:text-white transition-colors">
                                    {isMuted || volume === 0 ? <VolumeX size={18} /> : <Volume2 size={18} />}
                                </button>
                                <input 
                                    type="range" 
                                    min="0" 
                                    max="1" 
                                    step="0.01"
                                    value={isMuted ? 0 : volume}
                                    onChange={handleVolumeChange}
                                    className="w-full h-1 bg-neutral-800 rounded-full appearance-none cursor-pointer accent-cyan-400"
                                />
                            </div>

                            <h3 className="text-sm font-black uppercase tracking-widest text-neutral-400 mb-4 flex items-center gap-2">
                                <Music size={16} /> Cola de Reproducción
                            </h3>

                            {/* Buscador de canciones */}
                            <div className="relative mb-4">
                                <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 text-neutral-500" size={16} />
                                <input
                                    type="text"
                                    placeholder="Buscar canción o artista..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full bg-white/5 border border-white/10 rounded-lg pl-10 pr-4 py-2 text-sm text-white focus:outline-none focus:border-cyan-500 transition-colors placeholder:text-neutral-600"
                                />
                            </div>

                            <div className="flex-1 overflow-y-auto pr-2 space-y-3 custom-scrollbar">
                                {playlist
                                    .map((track, originalIndex) => ({ ...track, originalIndex }))
                                    .filter(track => 
                                        track.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                        track.artist.toLowerCase().includes(searchTerm.toLowerCase())
                                    )
                                    .map((track) => {
                                    const isActive = currentTrackIndex === track.originalIndex;
                                    return (
                                        <div 
                                            key={track.originalIndex} 
                                            onClick={() => playTrack(track.originalIndex)}
                                            className={`group relative flex items-center gap-4 p-3 rounded-xl cursor-pointer transition-all border ${
                                                isActive 
                                                    ? 'bg-white/10 border-cyan-500/50 shadow-[inset_0_0_20px_rgba(34,211,238,0.1)]' 
                                                    : 'bg-white/5 border-transparent hover:bg-white/10 hover:border-white/20'
                                            }`}
                                        >
                                            <div className="w-12 h-12 relative flex-shrink-0 overflow-hidden rounded-md">
                                                <img 
                                                    src={track.cover} 
                                                    alt="Cover" 
                                                    className="w-full h-full object-cover" 
                                                    onError={(e) => { e.target.src = fallbackCover; }}
                                                />
                                                {isActive && isPlaying && !isBuffering && (
                                                    <div className="absolute inset-0 bg-black/60 flex items-center justify-center gap-1">
                                                        <div className="w-1 h-3 bg-cyan-400 animate-[bounce_1s_infinite]"></div>
                                                        <div className="w-1 h-4 bg-fuchsia-500 animate-[bounce_1.2s_infinite]"></div>
                                                        <div className="w-1 h-2 bg-cyan-400 animate-[bounce_0.8s_infinite]"></div>
                                                    </div>
                                                )}
                                            </div>
                                            
                                            <div className="flex flex-col flex-1 min-w-0">
                                                <span className={`font-bold uppercase truncate text-sm tracking-wider ${isActive ? 'text-cyan-400' : 'text-white'}`}>
                                                    {track.title} {track.numChunks && <span className="text-[9px] text-fuchsia-400 border border-fuchsia-500/30 px-1 rounded ml-1 lowercase tracking-normal">cloud</span>}
                                                </span>
                                                <span className="text-xs text-neutral-500 uppercase tracking-widest truncate">
                                                    {track.artist}
                                                </span>
                                            </div>

                                            {/* BOTON ELIMINAR SOLO VISIBLE PARA ADMIN */}
                                            {isAdmin && (
                                                <button 
                                                    onClick={(e) => removeTrack(track.originalIndex, e)}
                                                    className="p-2 text-neutral-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"
                                                    title="Eliminar"
                                                >
                                                    <Trash2 size={16} />
                                                </button>
                                            )}
                                        </div>
                                    );
                                })}
                                
                                {/* Mensaje si no hay resultados */}
                                {playlist.filter(track => 
                                    track.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                    track.artist.toLowerCase().includes(searchTerm.toLowerCase())
                                ).length === 0 && (
                                    <div className="text-center text-neutral-600 text-xs py-4 uppercase tracking-widest">
                                        No se encontraron resultados para "{searchTerm}".
                                    </div>
                                )}
                            </div>

                        </div>
                    </div>

                    <audio 
                        ref={audioRef} 
                        src={resolvedAudioSrc}
                        onTimeUpdate={handleTimeUpdate}
                        onLoadedMetadata={handleLoadedMetadata}
                        onEnded={handleNext}
                    />
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
