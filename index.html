<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBAN MUSIC - Karito Casana</title>
    <style>
        :root { --neon: #39ff14; --bg: #0a0a0a; }
        body { margin: 0; font-family: sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        /* Fondo Urbano Realista (Cambiado para que no falle) */
        .bg-urban { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://unsplash.com'); background-size: cover; background-position: center; }
        header { padding: 50px; text-align: center; }
        .logo { font-size: 3rem; color: var(--neon); text-shadow: 0 0 20px var(--neon); text-transform: uppercase; letter-spacing: 5px; margin: 0; }
        #player-container { display: flex; justify-content: center; padding: 20px; width: 100%; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid var(--neon); border-radius: 20px; padding: 25px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.3s; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 15px; margin-bottom: 20px; background: #222; }
        h2 { font-size: 1.5rem; margin: 10px 0; }
        audio { width: 100%; filter: invert(1); margin: 15px 0; }
        .btn { background: var(--neon); color: black; padding: 12px 25px; text-decoration: none; font-weight: bold; border-radius: 50px; display: inline-block; }
    </style>
</head>
<body>
    <div class="bg-urban"></div>
    <header><h1 class="logo">URBAN MUSIC</h1></header>
    
    <main id="player-container">
        <p id="status">Buscando música en tu cuenta...</p>
    </main>

    <script>
        // TU IDENTIFICADOR DE ARCHIVE.ORG
        const identifier = 'la-bella-luz-coqueta';

        async function initPlayer() {
            try {
                // Preguntamos a la API de Archive por los archivos reales
                const response = await fetch(`https://archive.org{identifier}`);
                const data = await response.json();
                
                // Buscamos el archivo que termine en .mp3 (sin importar el nombre)
                const mp3 = data.files.find(f => f.name.toLowerCase().endsWith('.mp3'));
                
                if (mp3) {
                    const audioUrl = `https://archive.org{identifier}/${encodeURIComponent(mp3.name)}`;
                    const coverUrl = `https://archive.org{identifier}`;
                    
                    document.getElementById('player-container').innerHTML = `
                        <div class="card">
                            <img src="${coverUrl}" onerror="this.src='https://archive.org'">
                            <h2>${data.metadata.title || "Nueva Canción"}</h2>
                            <audio controls><source src="${audioUrl}" type="audio/mpeg"></audio>
                            <a href="${audioUrl}" download class="btn">DESCARGAR MP3</a>
                        </div>
                    `;
                } else {
                    document.getElementById('status').innerText = "No se encontró un archivo MP3 en este item.";
                }
            } catch (e) {
                document.getElementById('status').innerText = "Error de conexión. Intenta recargar.";
            }
        }

        initPlayer();
    </script>
</body>
</html>
