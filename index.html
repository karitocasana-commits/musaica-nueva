<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psicosis Music - Estrenos VIP</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #03000a; }
        
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .neon-glow-btn { box-shadow: 0 0 20px rgba(6, 182, 212, 0.6); transition: all 0.3s ease; }
        .neon-glow-btn:hover { box-shadow: 0 0 35px rgba(217, 70, 239, 0.8); transform: scale(1.05); }

        .neon-text-cyan { text-shadow: 0 0 8px rgba(6, 182, 212, 0.8), 0 0 20px rgba(6, 182, 212, 0.3); }
        .neon-text-fuchsia { text-shadow: 0 0 8px rgba(217, 70, 239, 0.8), 0 0 20px rgba(217, 70, 239, 0.3); }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(3, 0, 10, 0.6); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(217, 70, 239, 0.2); border-radius: 10px; border: 1px solid rgba(6, 182, 212, 0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(6, 182, 212, 0.6); box-shadow: 0 0 10px rgba(6, 182, 212, 0.8); }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%;
            background: #ffffff; cursor: pointer; box-shadow: 0 0 12px currentColor; border: 2px solid #03000a;
        }
    </style>
</head>
<body class="bg-[#03000a] text-neutral-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const { createRoot } = ReactDOM;

        // --- ICONOS ---
        const PlayIcon = ({ size=24, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const PauseIcon = ({ size=24, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>;
        const SkipForwardIcon = ({ size=24, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>;
        const SkipBackIcon = ({ size=24, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="5" x2="5" y2="19"/></svg>;
        const Volume2Icon = ({ size=24, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>;
        const VolumeXIcon = ({ size=24, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>;
        const DownloadIcon = ({ size=24, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const SaveIcon = ({ size=24, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const DiscIcon = ({ size=24, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>;
        const ZapIcon = ({ size=24, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
        const TrashIcon = ({ size=24, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const SearchIcon = ({ size=24, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const XIcon = ({ size=24, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const BankIcon = ({ size=24, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="2" y="5" width="20" height="14" rx="2" ry="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>;

        function App() {
            // Reproductor State
            const [isPlaying, setIsPlaying] = useState(false);
            const [progress, setProgress] = useState(0);
            const [duration, setDuration] = useState(0);
            const [volume, setVolume] = useState(0.8);
            const [isMuted, setIsMuted] = useState(false);
            const [errorMessage, setErrorMessage] = useState("");
            const [currentTrackIndex, setCurrentTrackIndex] = useState(0);
            const [searchTerm, setSearchTerm] = useState("");
            const [isDownloading, setIsDownloading] = useState(false);
            
            // Firebase & Playlist State
            const [playlist, setPlaylist] = useState([]);
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [firebaseReady, setFirebaseReady] = useState(false);
            
            // Admin State
            const [isAdmin, setIsAdmin] = useState(() => localStorage.getItem('psicosis_admin') === 'true');
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [adminPasswordInput, setAdminPasswordInput] = useState("");

            // Admin Form State
            const [newTitle, setNewTitle] = useState("");
            const [newArtist, setNewArtist] = useState("");
            const [newCover, setNewCover] = useState("");
            const [newAudioSrc, setNewAudioSrc] = useState("");

            const audioRef = useRef(null);
            const fallbackCover = "https://placehold.co/600x600/03000a/c026d3?text=VIP+MUSIC";

            // 1. Inicializar Firebase (La Base de Datos Mágica)
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                        if (!configStr) {
                            console.warn("Sin Firebase. Usando base de datos local para pruebas.");
                            const local = localStorage.getItem('psicosis_playlist');
                            if(local) setPlaylist(JSON.parse(local));
                            return;
                        }

                        const firebaseConfig = JSON.parse(configStr);
                        
                        // Utilizamos Function para evitar que Babel transpile import() a require() en el navegador
                        const importESM = new Function('url', 'return import(url)');
                        
                        const { initializeApp } = await importESM('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js');
                        const { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = await importESM('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');
                        const { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } = await importESM('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');

                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const firestore = getFirestore(app);
                        setDb(firestore);

                        // Exportamos funciones para usarlas luego
                        window.fsMethods = { doc, setDoc, deleteDoc, collection, onSnapshot };

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        onAuthStateChanged(auth, setUser);
                        setFirebaseReady(true);
                    } catch (e) {
                        console.error("Error Firebase:", e);
                    }
                };
                initFirebase();
            }, []);

            // 2. Cargar Canciones Automáticamente para Todos
            useEffect(() => {
                if (!firebaseReady || !db || !user) return;
                
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'psicosis-app';
                const songsRef = window.fsMethods.collection(db, 'artifacts', appId, 'public', 'data', 'songs');

                const unsubscribe = window.fsMethods.onSnapshot(songsRef, (snapshot) => {
                    const songs = [];
                    snapshot.forEach(doc => {
                        songs.push({ id: doc.id, ...doc.data() });
                    });
                    // Ordenar por las más nuevas primero
                    songs.sort((a, b) => b.createdAt - a.createdAt);
                    setPlaylist(songs);
                }, (error) => {
                    console.error(error);
                    showMsg("Error conectando a la base de datos", "error");
                });

                return () => unsubscribe();
            }, [firebaseReady, db, user]);

            const currentTrack = playlist[currentTrackIndex];

            // Control del Reproductor
            useEffect(() => {
                if (audioRef.current && currentTrack) {
                    audioRef.current.load();
                    if (isPlaying) {
                        const playPromise = audioRef.current.play();
                        if (playPromise !== undefined) {
                            playPromise.catch(e => {
                                console.error("Autoplay bloqueado:", e);
                                setIsPlaying(false);
                            });
                        }
                    }
                }
            }, [currentTrackIndex, playlist.length]);

            const showMsg = (msg) => {
                setErrorMessage(msg);
                setTimeout(() => setErrorMessage(""), 4000);
            };

            const togglePlay = async () => {
                if (!currentTrack) return;
                if (isPlaying) {
                    audioRef.current.pause();
                    setIsPlaying(false);
                } else {
                    try {
                        await audioRef.current.play();
                        setIsPlaying(true);
                    } catch (error) {
                        setIsPlaying(false);
                        showMsg("Error al reproducir enlace.");
                    }
                }
            };

            // --- DESCARGA DIRECTA REAL (Sin abrir otras pestañas) ---
            const handleDirectDownload = async () => {
                if (!currentTrack) return;
                if (isDownloading) return;
                
                setIsDownloading(true);
                showMsg("Preparando descarga directa... ⏳");
                
                try {
                    // Usamos fetch para traer el archivo como "blob" (datos crudos)
                    const response = await fetch(currentTrack.src);
                    if (!response.ok) throw new Error("Network error");
                    
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    
                    // Creamos un enlace invisible y forzamos el click
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `${currentTrack.artist} - ${currentTrack.title}.mp3`; // Nombre bonito automático
                    document.body.appendChild(a);
                    a.click();
                    
                    window.URL.revokeObjectURL(url);
                    showMsg("¡Descarga completada con éxito! ✅");
                } catch (error) {
                    console.error("CORS block, fallback to tab:", error);
                    // Si el navegador bloquea la descarga directa, abrimos el link de forma tradicional
                    window.open(currentTrack.src, '_blank');
                    showMsg("Descargando desde servidor seguro...");
                } finally {
                    setIsDownloading(false);
                }
            };

            // --- PANEL DE ADMINISTRADOR ---
            const handleAdminAccess = () => {
                if (isAdmin) {
                    setIsAdmin(false);
                    localStorage.removeItem('psicosis_admin');
                    showMsg("Modo Creador Cerrado 🔒");
                } else {
                    setShowAdminModal(true);
                }
            };

            const handleAdminSubmit = () => {
                if (adminPasswordInput === "psicosis") {
                    setIsAdmin(true);
                    localStorage.setItem('psicosis_admin', 'true');
                    showMsg("¡Modo Creador Activo! 🔓");
                    setShowAdminModal(false);
                    setAdminPasswordInput("");
                } else {
                    showMsg("Clave incorrecta ❌");
                    setAdminPasswordInput("");
                }
            };

            // --- GUARDADO AUTOMÁTICO EN LA NUBE ---
            const saveNewTrack = async (e) => {
                e.preventDefault();
                if (!newTitle || !newAudioSrc) {
                    showMsg("Falta el título o el enlace de audio.");
                    return;
                }

                showMsg("Guardando tema en la nube... ☁️");
                const newId = 'track_' + Date.now();
                const trackData = {
                    title: newTitle,
                    artist: newArtist || "Desconocido",
                    cover: newCover || fallbackCover,
                    src: newAudioSrc,
                    createdAt: Date.now()
                };

                if (firebaseReady && db && user) {
                    try {
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'psicosis-app';
                        const docRef = window.fsMethods.doc(db, 'artifacts', appId, 'public', 'data', 'songs', newId);
                        await window.fsMethods.setDoc(docRef, trackData);
                        showMsg("¡Tema Inyectado Permanentemente! 🎉 Todos pueden verlo.");
                        
                        // Limpiar formulario
                        setNewTitle(""); setNewArtist(""); setNewCover(""); setNewAudioSrc("");
                    } catch (err) {
                        console.error(err);
                        showMsg("Error al guardar en la nube.");
                    }
                } else {
                    // Modo Local Fallback
                    const updated = [trackData, ...playlist];
                    setPlaylist(updated);
                    localStorage.setItem('psicosis_playlist', JSON.stringify(updated));
                    showMsg("Guardado localmente (Sin conexión a BD)");
                }
            };

            // --- ELIMINAR TEMA ---
            const deleteTrack = async (e, trackId) => {
                e.stopPropagation();
                if(!window.confirm("¿Estás seguro de eliminar este tema para todos?")) return;
                
                if (firebaseReady && db && user) {
                    try {
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'psicosis-app';
                        const docRef = window.fsMethods.doc(db, 'artifacts', appId, 'public', 'data', 'songs', trackId);
                        await window.fsMethods.deleteDoc(docRef);
                        showMsg("Tema eliminado correctamente 🗑️");
                    } catch(err) {
                        showMsg("Error al eliminar");
                    }
                }
            };

            const handleProgressChange = (e) => {
                const newTime = e.target.value;
                if(audioRef.current) audioRef.current.currentTime = newTime;
                setProgress(newTime);
            };

            const handleVolumeChange = (e) => {
                const newVolume = parseFloat(e.target.value);
                setVolume(newVolume);
                if (audioRef.current) audioRef.current.volume = newVolume;
                setIsMuted(newVolume === 0);
            };

            const toggleMute = () => {
                if (isMuted) {
                    if(audioRef.current) audioRef.current.volume = volume || 0.5;
                    setIsMuted(false);
                } else {
                    if(audioRef.current) audioRef.current.volume = 0;
                    setIsMuted(true);
                }
            };

            // Funciones de formato
            const formatTime = (time) => {
                if (!time || isNaN(time)) return "0:00";
                const mins = Math.floor(time / 60);
                const secs = Math.floor(time % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            };

            const coverToDisplay = currentTrack?.cover || fallbackCover;

            return (
                <div className="min-h-screen w-full font-sans text-neutral-200 flex flex-col items-center justify-center p-4 relative overflow-hidden bg-[#03000a]">
                    
                    {/* Luces Neón */}
                    <div className="absolute top-[-15%] left-[-15%] w-[50vw] h-[50vw] bg-fuchsia-600/15 rounded-full blur-[140px] pointer-events-none animate-pulse"></div>
                    <div className="absolute bottom-[-15%] right-[-15%] w-[50vw] h-[50vw] bg-cyan-600/15 rounded-full blur-[140px] pointer-events-none animate-pulse" style={{ animationDelay: '1s' }}></div>

                    {/* Notificaciones Flash */}
                    {errorMessage && (
                        <div className="absolute top-6 z-50 bg-[#060012]/95 border-2 border-cyan-500 text-cyan-300 px-6 py-3 rounded-md shadow-[0_0_20px_rgba(6,182,212,0.8)] font-bold text-sm tracking-widest uppercase flex items-center gap-3 backdrop-blur-md">
                            <ZapIcon size={18} className="text-cyan-400 animate-bounce" /> {errorMessage}
                        </div>
                    )}

                    {/* MODAL DE CONTRASEÑA */}
                    {showAdminModal && (
                        <div className="fixed inset-0 bg-black/85 backdrop-blur-md flex items-center justify-center z-50 p-4">
                            <div className="w-full max-w-md bg-[#090514] border-2 border-fuchsia-500 rounded-2xl p-6 shadow-[0_0_30px_rgba(217,70,239,0.5)] relative">
                                <button onClick={() => setShowAdminModal(false)} className="absolute top-4 right-4 text-neutral-400 hover:text-fuchsia-400"><XIcon size={20}/></button>
                                <h3 className="text-xl font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500 mb-4 flex items-center gap-2">
                                    <ZapIcon size={20} className="text-fuchsia-500" /> Admin
                                </h3>
                                <input 
                                    type="password" placeholder="Clave..." value={adminPasswordInput}
                                    onChange={(e) => setAdminPasswordInput(e.target.value)}
                                    onKeyDown={(e) => { if (e.key === 'Enter') handleAdminSubmit(); }}
                                    className="w-full bg-black/60 border border-fuchsia-500/40 rounded-lg px-4 py-3 text-sm text-fuchsia-200 focus:outline-none focus:border-fuchsia-400 mb-6" autoFocus
                                />
                                <div className="flex justify-end">
                                    <button onClick={handleAdminSubmit} className="px-5 py-2.5 bg-fuchsia-600 hover:bg-fuchsia-500 text-white rounded-lg font-bold uppercase tracking-wider">Entrar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* APP PRINCIPAL */}
                    <div className="w-full max-w-4xl bg-black/60 backdrop-blur-2xl border border-cyan-500/30 rounded-3xl shadow-[0_0_40px_rgba(6,182,212,0.25)] overflow-hidden flex flex-col md:flex-row z-10 mb-6">
                        
                        {/* LADO IZQ: REPRODUCTOR */}
                        <div className="w-full md:w-1/2 p-8 flex flex-col items-center justify-between border-b md:border-b-0 md:border-r border-cyan-500/20 relative">
                            
                            <div className="w-full flex justify-between items-center mb-8">
                                <h1 className="text-2xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-fuchsia-400 to-green-400 uppercase flex items-center gap-2 select-none">
                                    {/* CLIC SECRETO AQUÍ PARA ADMINISTRADOR */}
                                    <div onClick={handleAdminAccess} className="cursor-pointer hover:scale-110 transition-transform active:scale-95" title={isAdmin ? "Cerrar Creador" : "Modo Creador"}>
                                        <DiscIcon className={`text-cyan-400 neon-text-cyan ${isPlaying ? 'animate-spin-slow' : ''}`} />
                                    </div>
                                    <span className="neon-text-cyan">Psicosis</span>
                                </h1>
                                
                                <button onClick={handleDirectDownload} disabled={isDownloading || !currentTrack} className="bg-gradient-to-r from-cyan-600 to-cyan-500 hover:from-cyan-500 hover:to-cyan-400 text-white transition-all px-4 py-2 rounded-full border border-cyan-400 shadow-[0_0_15px_rgba(6,182,212,0.5)] font-bold text-xs uppercase tracking-wider flex items-center gap-2 disabled:opacity-50">
                                    <DownloadIcon size={18} /> {isDownloading ? 'Bajando...' : 'Descarga Directa'}
                                </button>
                            </div>

                            {/* Vinilo */}
                            <div className="relative group w-56 h-56 md:w-64 md:h-64 mb-8">
                                <div className={`absolute inset-0 bg-gradient-to-tr from-cyan-500 to-fuchsia-500 rounded-full blur-2xl opacity-40 ${isPlaying ? 'animate-pulse opacity-70' : 'opacity-20'}`}></div>
                                <div className="absolute inset-0 rounded-full border-2 border-fuchsia-500 shadow-[0_0_20px_rgba(217,70,239,0.7)] z-10"></div>
                                <img src={coverToDisplay} alt="Cover" className={`w-full h-full object-cover rounded-full border-[6px] border-black shadow-2xl relative z-10 ${isPlaying ? 'animate-spin-slow' : ''}`} onError={(e) => { e.target.src = fallbackCover; }} style={{ animationPlayState: isPlaying ? 'running' : 'paused' }}/>
                                <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-12 h-12 bg-[#03000a] rounded-full border-4 border-cyan-500/60 z-30 flex items-center justify-center">
                                    <div className="w-2 h-2 bg-fuchsia-500 rounded-full"></div>
                                </div>
                            </div>

                            <div className="text-center w-full mb-6">
                                <h2 className="text-3xl font-black uppercase tracking-wide text-white truncate mb-1 neon-text-fuchsia">{currentTrack?.title || "Esperando Pistas"}</h2>
                                <p className="text-cyan-400 font-bold tracking-widest text-sm uppercase neon-text-cyan">{currentTrack?.artist || "Psicosis Music"}</p>
                            </div>

                            {/* Controles y Progreso */}
                            <div className="w-full mb-6">
                                <div className="flex items-center gap-4 font-mono text-xs text-cyan-400/80 mb-4">
                                    <span>{formatTime(progress)}</span>
                                    <div className="relative flex-1 h-2 bg-neutral-900 rounded-full border border-cyan-500/20">
                                        <div className="absolute top-0 left-0 h-full bg-gradient-to-r from-cyan-400 to-fuchsia-500 rounded-full shadow-[0_0_10px_rgba(6,182,212,0.8)]" style={{ width: `${duration ? (progress / duration) * 100 : 0}%` }}></div>
                                        <input type="range" min="0" max={duration || 100} value={progress} onChange={handleProgressChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20" />
                                    </div>
                                    <span>{formatTime(duration)}</span>
                                </div>
                                <div className="flex justify-center items-center gap-8">
                                    <button onClick={() => setCurrentTrackIndex((prev) => (prev - 1 + playlist.length) % playlist.length)} className="text-neutral-400 hover:text-cyan-400"><SkipBackIcon size={28}/></button>
                                    <button onClick={togglePlay} className="w-16 h-16 flex items-center justify-center bg-transparent border-2 border-cyan-400 text-cyan-400 rounded-full neon-glow-btn">
                                        {isPlaying ? <PauseIcon size={30} className="fill-current" /> : <PlayIcon size={30} className="fill-current ml-1" />}
                                    </button>
                                    <button onClick={() => setCurrentTrackIndex((prev) => (prev + 1) % playlist.length)} className="text-neutral-400 hover:text-cyan-400"><SkipForwardIcon size={28}/></button>
                                </div>
                            </div>
                        </div>

                        {/* LADO DER: INYECTOR Y PLAYLIST */}
                        <div className="w-full md:w-1/2 p-6 flex flex-col bg-black/80">
                            
                            {/* PANEL ADMIN (Inyector Permanente) */}
                            {isAdmin && (
                                <form onSubmit={saveNewTrack} className="mb-6 bg-fuchsia-950/20 p-4 rounded-xl border border-fuchsia-500/40 shadow-[0_0_15px_rgba(217,70,239,0.1)]">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-xs font-bold uppercase tracking-widest text-fuchsia-400 flex items-center gap-2"><ZapIcon size={16}/> INYECTOR (Auto-Guardado)</h3>
                                        <span className="text-[9px] bg-fuchsia-600 px-2 py-1 rounded text-white font-bold">ONLINE</span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 mb-3">
                                        <input type="text" placeholder="Nombre Canción" required value={newTitle} onChange={e=>setNewTitle(e.target.value)} className="bg-black/50 border border-fuchsia-500/30 rounded px-3 py-2 text-xs text-white focus:outline-none focus:border-fuchsia-400"/>
                                        <input type="text" placeholder="Artista" required value={newArtist} onChange={e=>setNewArtist(e.target.value)} className="bg-black/50 border border-fuchsia-500/30 rounded px-3 py-2 text-xs text-white focus:outline-none focus:border-fuchsia-400"/>
                                    </div>
                                    <input type="url" placeholder="URL Imagen Portada (.jpg/.png)" required value={newCover} onChange={e=>setNewCover(e.target.value)} className="w-full bg-black/50 border border-fuchsia-500/30 rounded px-3 py-2 text-xs text-white mb-3 focus:outline-none focus:border-fuchsia-400"/>
                                    <input type="url" placeholder="URL Audio MP3 (Archive.org)" required value={newAudioSrc} onChange={e=>setNewAudioSrc(e.target.value)} className="w-full bg-black/50 border border-fuchsia-500/30 rounded px-3 py-2 text-xs text-white mb-3 focus:outline-none focus:border-fuchsia-400"/>
                                    <button type="submit" className="w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold text-xs uppercase tracking-widest py-3 rounded flex items-center justify-center gap-2 shadow-[0_0_10px_rgba(217,70,239,0.5)]">
                                        <SaveIcon size={16} /> Publicar para todos
                                    </button>
                                </form>
                            )}

                            {/* Buscador */}
                            <div className="relative mb-4">
                                <SearchIcon className="absolute left-3 top-1/2 transform -translate-y-1/2 text-cyan-500" size={16} />
                                <input type="text" placeholder="Buscar en el catálogo..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full bg-black/60 border border-cyan-500/20 rounded-lg pl-10 pr-4 py-2.5 text-sm text-cyan-100 focus:outline-none focus:border-cyan-400" />
                            </div>

                            {/* Playlist */}
                            <div className="flex-1 overflow-y-auto pr-2 space-y-2 custom-scrollbar min-h-[300px] max-h-[400px]">
                                {playlist.length === 0 ? (
                                    <div className="text-center text-cyan-800 text-xs py-8 uppercase tracking-widest">Base de datos vacía</div>
                                ) : playlist
                                    .map((track, idx) => ({ ...track, originalIndex: idx }))
                                    .filter(t => t.title.toLowerCase().includes(searchTerm.toLowerCase()) || t.artist.toLowerCase().includes(searchTerm.toLowerCase()))
                                    .map((track) => {
                                        const isActive = currentTrackIndex === track.originalIndex;
                                        return (
                                            <div key={track.id} onClick={() => {setCurrentTrackIndex(track.originalIndex); setIsPlaying(true);}} className={`group flex items-center gap-4 p-2 rounded-xl cursor-pointer transition-all border ${isActive ? 'bg-cyan-950/30 border-cyan-500 shadow-[0_0_10px_rgba(6,182,212,0.2)]' : 'bg-black/40 border-transparent hover:bg-neutral-900/60'}`}>
                                                <div className="w-12 h-12 flex-shrink-0 overflow-hidden rounded-md border border-cyan-500/20 relative">
                                                    <img src={track.cover} alt="Cover" className="w-full h-full object-cover" onError={(e) => { e.target.src = fallbackCover; }}/>
                                                    {isActive && isPlaying && (
                                                        <div className="absolute inset-0 bg-black/60 flex items-center justify-center gap-0.5">
                                                            <div className="w-1 h-3 bg-cyan-400 animate-bounce"></div><div className="w-1 h-5 bg-fuchsia-500 animate-bounce [animation-delay:0.2s]"></div><div className="w-1 h-2 bg-green-400 animate-bounce [animation-delay:0.4s]"></div>
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="flex flex-col flex-1 min-w-0">
                                                    <span className={`font-bold uppercase truncate text-sm ${isActive ? 'text-cyan-400' : 'text-neutral-200'}`}>{track.title}</span>
                                                    <span className="text-xs text-neutral-500 uppercase truncate">{track.artist}</span>
                                                </div>
                                                {isAdmin && (
                                                    <button onClick={(e) => deleteTrack(e, track.id)} className="p-2 text-red-900 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                                                        <TrashIcon size={18}/>
                                                    </button>
                                                )}
                                            </div>
                                        );
                                    })}
                            </div>
                        </div>
                    </div>

                    {/* SECCIÓN DE APORTES (NUEVA MONETIZACIÓN) */}
                    <div className="w-full max-w-4xl bg-gradient-to-r from-green-900/20 to-cyan-900/20 border border-green-500/30 rounded-2xl p-5 flex flex-col md:flex-row items-center justify-between z-10 shadow-[0_0_20px_rgba(34,197,94,0.1)]">
                        <div className="flex items-center gap-4 mb-4 md:mb-0">
                            <div className="bg-green-500/20 p-3 rounded-full border border-green-500 text-green-400">
                                <BankIcon size={24} />
                            </div>
                            <div>
                                <h3 className="text-green-400 font-bold uppercase tracking-widest text-sm neon-text-green">Mantén la música viva 🎧</h3>
                                <p className="text-xs text-neutral-400">Si descargas estrenos gratis, apoya al DJ con Yape/Plin o al CCI para pagar servidores.</p>
                            </div>
                        </div>
                        <div className="text-center md:text-right">
                            <p className="text-xs text-neutral-500 uppercase tracking-widest mb-1">Aportes Voluntarios a:</p>
                            <div className="bg-black/60 border border-green-500/50 px-4 py-2 rounded text-green-400 font-mono font-bold tracking-wider select-all cursor-pointer hover:bg-green-900/40 transition-colors">
                                [TU NÚMERO YAPE / PLIN / BCP AQUÍ]
                            </div>
                        </div>
                    </div>

                    <audio ref={audioRef} src={currentTrack?.src || ""} onTimeUpdate={() => setProgress(audioRef.current.currentTime)} onLoadedMetadata={() => setDuration(audioRef.current.duration)} onEnded={() => setCurrentTrackIndex((p) => (p + 1) % playlist.length)} />
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
