<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="MUSICA NUEVA" content="width=device-width, initial-scale=1.0">
    <title>Mi Player Urbano 3D</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <div class="background-3d"></div>
    
    <header>
        <h1 class="logo">MUSICA NUEVA</h1>
    </header>

    <main id="player-container">
        <!-- Aquí se cargarán las canciones automáticamente -->
        <div id="loader">Cargando beats...</div>
    </main>

        <script>
        // CONFIGURACIÓN:
        const ARCHIVE_USER = 'karito_casana'; 

        async function fetchSongs() {
            // URL Corregida para buscar tus archivos
            const url = `https://archive.org{ARCHIVE_USER}+AND+mediatype:audio&output=json`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                const items = data.response.docs;
                const container = document.getElementById('player-container');
                container.innerHTML = '';

                if (items.length === 0) {
                    container.innerHTML = '<div id="loader">No se encontraron canciones públicas aún.</div>';
                    return;
                }

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'song-card';
                    
                    // URLs corregidas para imágenes y audio
                    const coverUrl = `https://archive.org{item.identifier}`;
                    const audioUrl = `https://archive.org{item.identifier}/${item.identifier}.mp3`;

                    card.innerHTML = `
                        <div class="cover-wrapper">
                            <img src="${coverUrl}" alt="Portada">
                        </div>
                        <h3>${item.title}</h3>
                        <audio controls>
                            <source src="${audioUrl}" type="audio/mpeg">
                        </audio>
                        <a href="${audioUrl}" download class="btn-download">DESCARGAR DIRECTA</a>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error cargando:", error);
                document.getElementById('loader').innerText = "Error al conectar con Archive.org.";
            }
        }

        fetchSongs();
    </script>
</body>
</html>
