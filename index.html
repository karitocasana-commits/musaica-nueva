<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÚSICA NUEVA | Urban Flow</title>
    <style>
        :root { --neon: #00ffea; --dark: #050505; --card: #121212; }
        body { background: var(--dark); color: white; font-family: 'Arial Black', sans-serif; margin: 0; padding: 20px; }
        header { border: 3px solid var(--neon); padding: 20px; margin-bottom: 30px; box-shadow: 0 0 15px var(--neon); display: inline-block; }
        h1 { text-transform: uppercase; letter-spacing: 2px; font-size: 1.8rem; margin: 0; }
        #music-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 40px auto; }
        .track-card { background: var(--card); border-bottom: 4px solid var(--neon); padding: 15px; transition: 0.3s; text-align: left; }
        .cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 1px solid #333; }
        h2 { font-size: 1rem; margin: 15px 0 5px 0; color: var(--neon); text-transform: uppercase; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        audio { width: 100%; height: 35px; filter: invert(1) hue-rotate(180deg); margin-top: 10px; }
        .btn-dl { display: block; background: var(--neon); color: black; padding: 12px; text-decoration: none; font-weight: bold; text-align: center; margin-top: 15px; font-size: 0.8rem; clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%); }
        #loading { font-size: 1.5rem; color: var(--neon); margin-top: 50px; text-align: center; width: 100%; }
    </style>
</head>
<body>

<center>
    <header><h1>MÚSICA NUEVA</h1></header>
</center>

<div id="music-container">
    <p id="loading">CARGANDO MÚSICA...</p>
</div>

<script>
    // URL corregida para evitar bloqueos
    const API_URL = "https://archive.org[]=identifier,title&sort[]=addeddate+desc&output=json";

    async function loadMusic() {
        const container = document.getElementById('music-container');
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            const docs = data.response.docs;

            if (docs.length === 0) {
                container.innerHTML = "<p id='loading'>No hay canciones públicas.</p>";
                return;
            }

            container.innerHTML = ''; 

            docs.forEach(item => {
                const id = item.identifier;
                const title = item.title || "Sin Título";
                
                // Links simplificados
                const audioLink = "https://archive.org" + id + "/" + id + ".mp3";
                const imgLink = "https://archive.org" + id;

                const card = document.createElement('div');
                card.className = 'track-card';
                card.innerHTML = `
                    <img src="${imgLink}" class="cover" onerror="this.src='https://placeholder.com'">
                    <h2>${title}</h2>
                    <audio controls src="${audioLink}"></audio>
                    <a href="${audioLink}" class="btn-dl" target="_blank" download>DESCARGAR</a>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            document.getElementById('loading').innerHTML = "ERROR DE CONEXIÓN.<br>Asegúrate de que tus archivos en Archive.org sean PÚBLICOS.";
        }
    }

    loadMusic();
</script>

</body>
</html>
