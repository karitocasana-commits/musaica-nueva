<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Música Nueva - Karito Casana</title>
    <style>
        :root { --neon: #39ff14; --bg: #0a0a0a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }
        .background-3d { position: fixed; width: 100vw; height: 100vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://unsplash.com'); background-size: cover; z-index: -1; }
        header { text-align: center; padding: 40px 20px; }
        .logo { font-size: 2.5rem; color: var(--neon); text-shadow: 0 0 15px var(--neon); text-transform: uppercase; }
        #player-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1100px; margin: auto; }
        .song-card { background: rgba(255,255,255,0.07); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .cover-wrapper img { width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        audio { width: 100%; margin: 15px 0; filter: invert(1); }
        .btn-download { display: inline-block; background: var(--neon); color: black; padding: 10px 20px; text-decoration: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="background-3d"></div>
    <header><h1 class="logo">URBAN MUSIC</h1></header>
    <main id="player-container"><div id="loader">Conectando con Archive.org...</div></main>

    <script>
        const ARCHIVE_USER = 'karito_casana'; 

        async function fetchSongs() {
            // URL OFICIAL DE BÚSQUEDA (CORREGIDA)
            const url = `https://archive.org{ARCHIVE_USER}+AND+mediatype:audio&output=json`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Error en el servidor');
                
                const data = await response.json();
                const items = data.response.docs;
                const container = document.getElementById('player-container');
                container.innerHTML = '';

                if (!items || items.length === 0) {
                    container.innerHTML = '<h2>No hay canciones públicas subidas por este usuario.</h2>';
                    return;
                }

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'song-card';
                    const coverUrl = `https://archive.org{item.identifier}`;
                    const audioUrl = `https://archive.org{item.identifier}/${item.identifier}.mp3`;

                    card.innerHTML = `
                        <div class="cover-wrapper"><img src="${coverUrl}" alt="Portada"></div>
                        <h3>${item.title.replace(/-/g, ' ')}</h3>
                        <audio controls><source src="${audioUrl}" type="audio/mpeg"></audio>
                        <a href="${audioUrl}" download class="btn-download">DESCARGAR</a>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error(error);
                document.getElementById('loader').innerHTML = `
                    <div style="color: #ff4444;">
                        <h3>Error de conexión</h3>
                        <p>No se pudo obtener la música. Intenta recargar la página.</p>
                    </div>`;
            }
        }
        fetchSongs();
    </script>
</body>
</html>
