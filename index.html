<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MÚSICA NUEVA | Urban Flow</title>
    <style>
        :root { --neon: #00ffea; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: 'Arial Black', sans-serif; margin: 0; padding: 20px; text-align: center; }
        header { border: 3px solid var(--neon); padding: 20px; margin-bottom: 30px; box-shadow: 0 0 15px var(--neon); display: inline-block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .card { background: #121212; border-bottom: 4px solid var(--neon); padding: 15px; text-align: left; }
        .cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 1px solid #333; background: #222; }
        h2 { font-size: 0.9rem; color: var(--neon); margin: 15px 0 5px; text-transform: uppercase; }
        audio { width: 100%; filter: invert(1) hue-rotate(180deg); margin: 10px 0; }
        .btn { display: block; background: var(--neon); color: black; padding: 12px; text-decoration: none; font-weight: bold; text-align: center; clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%); }
    </style>
</head>
<body>

    <header><h1>MÚSICA NUEVA</h1></header>

    <div class="grid">

        <!-- PISTA 4 -->
        <div class="card">
            <img src="https://archive.org" class="cover">
            <h2>PISTA 4</h2>
            <audio controls src="https://archive.org"></audio>
            <a href="https://archive.org" class="btn" target="_blank">DESCARGAR MP3</a>
        </div>

        <!-- PISTA 3 -->
        <div class="card">

            <a href="https://archive.org" class="btn" target="_blank">DESCARGAR MP3</a>
        </div>

        <!-- PISTA 2 -->
        <div class="card">
            <img src="https://archive.org" class="cover">
            <h2>PISTA 2</h2>
            <audio controls src="https://archive.org"></audio>
            <a href="https://archive.org" class="btn" target="_blank">DESCARGAR MP3</a>
        </div>

        <!-- PISTA 1 -->
        <div class="card">
            <img src="https://archive.org" class="cover">
            <h2>PISTA 1</h2>
            <audio controls src="https://archive.org"></audio>
            <a href="https://archive.org" class="btn" target="_blank">DESCARGAR MP3</a>
        </div>

    </div>

</body>
</html>
