<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Música Nueva - Karito Casana</title>
    <style>
        :root { --neon: #39ff14; --bg: #0a0a0a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow-x: hidden;}
        .background-3d { position: fixed; width: 100vw; height: 100vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://unsplash.com'); background-size: cover; z-index: -1; }
        header { text-align: center; padding: 40px 20px; }
        .logo { font-size: 2.5rem; color: var(--neon); text-shadow: 0 0 15px var(--neon); text-transform: uppercase; letter-spacing: 5px; }
        #player-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 20px; max-width: 1100px; margin: auto; }
        .song-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; transition: transform 0.3s; }
        .song-card:hover { transform: translateY(-5px); border-color: var(--neon); }
        .cover-wrapper img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        audio { width: 100%; margin: 15px 0; filter: invert(1); }
        .btn-download { display: inline-block; background: var(--neon); color: black; padding: 12px 25px; text-decoration: none; font-weight: bold; border-radius: 50px; }
        .btn-download:hover { background: white; }
        #loader { font-size: 1.2rem; color: #aaa; }
    </style>
</head>
<body>
    <div class="background-3d"></div>
    <header><h1 class="logo">URBAN MUSIC</h1></header>
    <main id="player-container"><div id="loader">Cargando tu música...</div></main>

    <script>
        // Usamos tu ID exacto de Archive.org
        const ARCHIVE_USER = 'karito_casana';

        function cargarCanciones(data) {
            const container = document.getElementById('player-container');
            container.innerHTML = '';

            // Si no hay datos, intentamos otra búsqueda o avisamos
            if (!data || !data.response || !data.response.docs || data.response.docs.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
                        <h2>Aún procesando tus temas...</h2>
                        <p>Archive.org tarda unos minutos en hacer pública la música nueva.</p>
                        <a href="https://archive.org" target="_blank" style="color:#39ff14">Ver mi perfil en Archive.org</a>
                    </div>`;
                return;
            }

            data.response.docs.forEach(item => {
                const card = document.createElement('div');
                card.className = 'song-card';
                
                // URLs automáticas
                const coverUrl = `https://archive.org{item.identifier}`;
                const audioUrl = `https://archive.org{item.identifier}/${item.identifier}.mp3`;

                card.innerHTML = `
                    <div class="cover-wrapper">
                        <img src="${coverUrl}" alt="Portada" onerror="this.src='https://archive.org'">
                    </div>
                    <h3>${item.title ? item.title.replace(/-/g, ' ') : 'Música Nueva'}</h3>
                    <audio controls preload="none">
                        <source src="${audioUrl}" type="audio/mpeg">
                    </audio>
                    <a href="${audioUrl}" download class="btn-download">DESCARGAR MP3</a>
                `;
                container.appendChild(card);
            });
        }

        // Esta línea es la clave: busca por uploader O por creador para no fallar
        const script = document.createElement('script');
        script.src = `https://archive.org(uploader:${ARCHIVE_USER} OR creator:${ARCHIVE_USER})&output=json&callback=cargarCanciones&rows=50`;
        document.body.appendChild(script);
    </script>
