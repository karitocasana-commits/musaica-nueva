<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MÚSICA NUEVA | Urban Flow</title>
    <style>
        :root { --neon: #00ffea; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        header { border: 3px solid var(--neon); padding: 20px; margin-bottom: 30px; box-shadow: 0 0 15px var(--neon); display: inline-block; }
        #music-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .track-card { background: #121212; border-bottom: 4px solid var(--neon); padding: 15px; text-align: left; }
        .cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #222; }
        h2 { font-size: 1rem; color: var(--neon); text-transform: uppercase; }
        audio { width: 100%; filter: invert(1); margin: 10px 0; }
        .btn-dl { display: block; background: var(--neon); color: black; padding: 10px; text-decoration: none; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <header><h1>MÚSICA NUEVA</h1></header>
    <div id="music-container">Cargando...</div>

    <script>
        var user = "karito_casana";
        var api = "https://archive.org" + user + "&fl[]=identifier,title&sort[]=addeddate+desc&output=json";

        fetch(api)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var items = data.response.docs;
                var html = "";
                
                if (items.length === 0) {
                    document.getElementById("music-container").innerHTML = "NO HAY ARCHIVOS PÚBLICOS EN TU PERFIL.";
                    return;
                }

                for (var i = 0; i < items.length; i++) {
                    var id = items[i].identifier;
                    var title = items[i].title || "Sin Título";
                    var mp3 = "https://archive.org" + id + "/" + id + ".mp3";
                    var img = "https://archive.org" + id;

                    html += '<div class="track-card">' +
                                '<img src="' + img + '" class="cover">' +
                                '<h2>' + title + '</h2>' +
                                '<audio controls src="' + mp3 + '"></audio>' +
                                '<a href="' + mp3 + '" class="btn-dl" target="_blank" download>DESCARGAR MP3</a>' +
                            '</div>';
                }
                document.getElementById("music-container").innerHTML = html;
            })
            .catch(function(err) {
                document.getElementById("music-container").innerHTML = "ERROR DE SERVIDOR.";
            });
    </script>
</body>
</html>
