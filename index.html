<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBAN MUSIC - Karito Casana</title>
    <style>
        :root { --neon: #39ff14; --bg: #0a0a0a; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; text-align: center; }
        .background-3d { position: fixed; width: 100vw; height: 100vh; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://unsplash.com'); background-size: cover; z-index: -1; }
        header { padding: 40px; }
        .logo { font-size: 2.5rem; color: var(--neon); text-shadow: 0 0 15px var(--neon); text-transform: uppercase; }
        #player-container { display: flex; justify-content: center; padding: 20px; }
        .song-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; width: 320px; border: 1px solid var(--neon); }
        .cover-wrapper img { width: 100%; border-radius: 10px; aspect-ratio: 1/1; object-fit: cover; background: #222; }
        audio { width: 100%; margin: 15px 0; filter: invert(1); }
        .btn-download { display: inline-block; background: var(--neon); color: black; padding: 12px 25px; text-decoration: none; font-weight: bold; border-radius: 50px; }
    </style>
</head>
<body>
    <div class="background-3d"></div>
    <header><h1 class="logo">URBAN MUSIC</h1></header>
    <main id="player-container">
        <div class="song-card">
            <div class="cover-wrapper">
                <!-- Enlace de imagen corregido -->
                <img src="https://archive.org">
            </div>
            <h3>La Bella Luz - Coqueta</h3>
            <audio controls>
                <!-- Enlace de audio corregido con el nombre real del archivo -->
                <source src="https://archive.org" type="audio/mpeg">
            </audio>
            <br>
            <a href="https://archive.org" download class="btn-download">DESCARGAR MP3</a>
        </div>
    </main>
</body>
</html>
